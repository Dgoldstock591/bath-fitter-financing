<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bath Fitter Synchrony Financing Planner</title>
<style>
:root{
  --bg:#f6f8fb;--card:#ffffff;--ink:#0d2033;--muted:#6b7b8d;--accent:#00A3AD;--accent-2:#4DD0E1;--border:#e5e9f2;
}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:960px;margin:auto;padding:20px}
.title{font-size:28px;font-weight:800;color:#006d73;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px;letter-spacing:.3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(13,32,51,.06)}
.card h3{margin:0;padding:14px 16px;border-bottom:1px solid var(--border);font-size:16px}
.card .body{padding:16px}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input,button{width:100%;padding:14px 14px;border:1px solid var(--border);border-radius:12px;font-size:18px}
button{cursor:pointer}
.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;font-weight:700}
.helper-text{margin-top:8px;font-size:13px;color:#006d73;text-align:center;background:#E8FAFB;padding:10px;border-radius:10px;font-weight:500}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:760px){.wrap{padding:14px}.plans{grid-template-columns:1fr}input,button{font-size:18px}}
.plan{border:1px solid var(--border);border-radius:14px;padding:14px;background:#fff;position:relative}
.plan.featured{border:2px solid var(--accent);box-shadow:0 0 0 4px rgba(0,163,173,.08)}
.tag{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-size:11px;padding:4px 8px;border-radius:999px;font-weight:700;letter-spacing:.2px}
.plan h4{margin:0 0 4px 0;font-size:18px;color:#006d73}
.desc{color:var(--muted);font-size:13px;margin:4px 0 10px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.kpi{flex:1 1 160px;background:#f4f7fb;border:1px dashed var(--border);border-radius:12px;padding:10px}
.kpi .label{font-size:12px;color:var(--muted)}
.kpi .val{font-weight:800;font-size:20px}
.note{margin-top:8px;font-size:14px;color:#00494e;background:#E8FAFB;padding:10px;border-radius:8px;font-weight:500}
.note strong{color:#007c85}
.addon{margin-top:10px;padding:10px 12px;border-left:4px solid #00A3AD;background:#E0F7F8;border-radius:8px;color:#0e4e52}
.addon b{font-style:normal}
.addon-toggle{display:inline-block;background:#ffffff;border:1px solid #00A3AD;color:#006d73;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer}
.addon-toggle:hover{background:#f0fbfc}
.addon-content{margin-top:8px;font-style:italic;display:none}
</style>
</head>
<body>
<div class="wrap">
<h1 class="title">Bath Fitter Synchrony Financing Planner</h1>
<p class="subtitle">Compare plans instantly and show clear monthly options for every customer</p>
<section class="card"><h3>Input</h3><div class="body">
<label>Amount to finance ($)</label>
<input id="amount" type="text" inputmode="decimal" autocomplete="off" value="8000" />
<div style="height:10px"></div>
<button id="calc" class="primary">Calculate Plans</button>
<p class="helper-text">Enter a total and tap <strong>Calculate</strong> — you’ll instantly see all plan options below.</p>
</div></section>
<section class="card"><h3>Results</h3><div class="body"><div id="plans" class="plans"></div></div></section>
<script>
const PLANS=[
{id:'960',name:'960 – Reduced APR',desc:'Lowest long-term payment 3.99% APR.',kind:'reducedAPR',apr:3.99,months:64},
{id:'925',name:'925 – No Interest (24 mo)',desc:'0% if paid in 24 months.',kind:'deferred0',months:24,minPct:0.025},
{id:'965',name:'965 – Reduced APR',desc:'11.99% APR, 86 months.',kind:'reducedAPR',apr:11.99,months:86},
{id:'924',name:'924 – No Interest (18 mo)',desc:'0% if paid in 18 months.',kind:'deferred0',months:18,minPct:0.025},
{id:'922',name:'922 – No Interest (12 mo)',desc:'0% if paid in 12 months.',kind:'deferred0',months:12,minPct:0.025}
];
const amountEl=document.getElementById('amount');const plansEl=document.getElementById('plans');const calcBtn=document.getElementById('calc');
function money(n){const w=Math.round(Number(n)||0);return w.toLocaleString(undefined,{style:'currency',currency:'USD',minimumFractionDigits:0});}
function parseAmount(r){return Number((r||'').toString().replace(/[^0-9.]/g,''))||0;}
function calcReducedAPR(a,apr,m){const r=apr/100/12;const e=r===0?a/m:(a*r)/(1-Math.pow(1+r,-m));const q=Math.ceil(e);return{monthly:q,months:m,totalPaid:q*m,totalInterest:q*m-a};}
function calcDeferred0(a,m,p){const t=Math.ceil(a/m);return{monthly:t,months:m,totalPaid:a,totalInterest:0};}
function pitchLine(id,r){const m=money(r.monthly);switch(id){case'960':return`<strong>Comfort Plan:</strong> ${m}/mo for ${r.months} months @3.99% APR — our most balanced option for affordability and flexibility.`;case'925':return`<strong>Smart 0% Plan:</strong> ${m}/mo for 24 months — perfect if you plan to pay it off quickly without interest.`;case'965':return`<strong>Flex Plan:</strong> ${m}/mo for ${r.months} months @11.99% APR — lower monthly, longer term for maximum flexibility.`;case'924':return`<strong>18-Month 0%:</strong> ${m}/mo — shorter payoff, no interest.`;case'922':return`<strong>12-Month 0%:</strong> ${m}/mo — fast payoff, no interest.`;default:return'';}}
function render(){const a=parseAmount(amountEl.value);if(!(a>0)){plansEl.innerHTML='<div class="desc">Enter an amount and press Calculate.</div>';return;}plansEl.innerHTML='';for(const p of PLANS){const r=p.kind==='reducedAPR'?calcReducedAPR(a,p.apr,p.months):calcDeferred0(a,p.months,p.minPct);const c=document.createElement('div');c.className='plan'+((p.id==='960'||p.id==='925')?' featured':'');const tag=(p.id==='960')?'<span class="tag">Most Popular</span>':(p.id==='925')?'<span class="tag">Best 0%</span>':'';c.innerHTML=`${tag}<h4>${p.name}</h4><div class="desc">${p.desc}</div><div class="row"><div class="kpi"><div class="label">Monthly</div><div class="val">${money(r.monthly)}</div></div><div class="kpi"><div class="label">Months</div><div class="val">${r.months}</div></div><div class="kpi"><div class="label">Total Paid</div><div class="val">${money(r.totalPaid)}</div></div><div class="kpi"><div class="label">Interest</div><div class="val">${money(r.totalInterest)}</div></div></div><div class="note">${pitchLine(p.id,r)}</div><div class="addon"><button class="addon-toggle" data-action="toggle-addon" aria-expanded="false">Sales Tips ▼</button><div class="addon-content">• You can always pay it off early — no fees or penalties.<br>• There’s no downside to financing; it’s simply a smarter way to start sooner.<br>• You choose whether you want the lowest monthly or the fastest payoff — both are great options.<br>• We just call in the approval — it takes about a minute, and we’ll have your exact payment confirmed right away.</div></div>`;plansEl.appendChild(c);}}
calcBtn.addEventListener('click',render);
amountEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();render();}});
plansEl.addEventListener('click',e=>{const b=e.target.closest('button.addon-toggle');if(!b)return;const ct=b.nextElementSibling;const open=b.getAttribute('aria-expanded')==='true';if(ct){ct.style.display=open?'none':'block';}b.setAttribute('aria-expanded',String(!open));b.textContent=`Sales Tips ${!open?'▲':'▼'}`;});
</script>
<footer style="text-align:center;font-size:10px;color:#a0a6ab;margin-top:20px;opacity:.4;">Created by David Goldstock</footer>
</body>
</html>
